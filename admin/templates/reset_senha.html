{% extends "base.html" %}

{% block title %}AGRIVIA · Resetar senha{% endblock %}

{% block content %}
<div class="page">
    <div class="card card-narrow">
        <h1 class="page-title">🔑 Resetar senha</h1>
        <p class="hint" style="margin-top:6px;">Usuário: <strong style="color:var(--text);">{{ usuario.email }}</strong></p>

        <form method="post" style="margin-top:8px;">
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <label>Nova senha</label>
            <input name="nova_senha" type="password" required>

            <div style="display:flex;gap:10px;margin-top:22px;">
                <button type="submit" class="btn btn-primary" style="flex:1;justify-content:center;padding:12px;">
                    Salvar nova senha
                </button>
                <a href="/admin/usuarios" class="btn btn-light" style="justify-content:center;padding:12px 16px;">
                    Voltar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
