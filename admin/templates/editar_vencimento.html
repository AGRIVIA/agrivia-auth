{% extends "base.html" %}

{% block title %}AGRIVIA · Vencimento{% endblock %}

{% block content %}
<div class="page">
    <div class="card card-narrow">
        <h1 class="page-title">📅 Editar vencimento</h1>
        <p class="hint" style="margin-top:6px;">
            <strong style="color:var(--text);">{{ usuario.nome }}</strong><br>{{ usuario.email }}
        </p>

        <form method="post" style="margin-top:8px;">
            <label>Data de vencimento</label>
            <input
                type="date"
                name="vencimento"
                value="{{ usuario.vencimento_pagamento.strftime('%Y-%m-%d') if usuario.vencimento_pagamento else '' }}"
                required
            >

            <div style="display:flex;gap:10px;margin-top:22px;">
                <button type="submit" class="btn btn-primary" style="flex:1;justify-content:center;padding:12px;">
                    💾 Salvar
                </button>
                <a href="/admin/usuarios" class="btn btn-light" style="justify-content:center;padding:12px 16px;">
                    Voltar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
